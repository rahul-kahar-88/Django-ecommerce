<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

.cart-container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    backdrop-filter: blur(15px);
}

.cart-title {
    font-size: 28px;
    font-weight: bold;
    color: #38bdf8;
}

.cart-card {
    background: rgba(255,255,255,0.06);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    transition: 0.3s;
}

.cart-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.item-name {
    font-weight: 600;
    font-size: 18px;
    color: #e2e8f0;
}

.price {
    color: #22c55e;
    font-weight: bold;
}

.qty {
    font-size: 14px;
    color: #cbd5f5;
}

.actions a {
    margin: 5px;
}

.btn-custom {
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
}

.total-box {
    margin-top: 25px;
    padding: 20px;
    background: rgba(0,0,0,0.4);
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.total-amount {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

@media(max-width:768px) {
    .cart-card {
        flex-direction: column;
        align-items: flex-start;
    }

    .actions {
        width: 100%;
    }

    .actions a {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="cart-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="cart-title">🛒 Your Cart</h2>
        <a href="{% url 'userdashboard' %}" class="btn btn-outline-light btn-sm">Continue Shopping</a>
    </div>

    {% if cart %}

        {% for i in cart %}
        <div class="cart-card">
            <div>
                <div class="item-name">{{ i.item.item_name }}</div>
                <div class="qty">Qty: {{ i.quantity }}</div>
            </div>

            <div>
                <div class="price">₹ {{ i.item.item_price }}</div>
                <div>Total: ₹ {{ i.item.item_price|floatformat:2 }}</div>
            </div>

            <div class="actions">
                <a href="{% url 'remove_cart' i.id %}" class="btn btn-danger btn-custom">
                    <i class="bi bi-trash"></i>
                </a>
                <a href="{% url 'payment' i.item.id %}" class="btn btn-success btn-custom">
                    Order
                </a>
            </div>
        </div>
        {% endfor %}

        <div class="total-box">
            <div class="total-amount">Total: ₹ {{ total }}</div>
            <a href="#" class="btn btn-primary" onclick="alert('This button is under development. For buy click on Order button.')">Proceed to Checkout</a>
        </div>

    {% else %}

        <div class="text-center mt-5">
            <i class="bi bi-cart-x" style="font-size:50px;"></i>
            <h4 class="mt-3">Your Cart is Empty</h4>
        </div>

    {% endif %}
</div>

</body>
</html>
