{% extends "index.html" %}

{% block title %}
<title>Join the Fleet | Registration</title>
{% endblock title %}

{% block content %}
<style>
  html, body {
    min-height: 100%;
    margin: 0;
    overflow-x: hidden;
  }

  body {
    background: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #000814 100%);
    background-attachment: fixed;
    color: #ffffff;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: 
      linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
  }

  .page-hero {
    min-height: calc(100vh - 80px);
    padding-top: 1rem;
    padding-bottom: 1rem;
  }

  .card {
    max-height: calc(100vh - 140px);
    overflow-y: auto;
  }

  .bg-glow {
    position: fixed;
    top: 20%;
    left: 20%;
    width: 400px;
    height: 400px;
    background: rgba(0, 242, 254, 0.1);
    filter: blur(100px);
    border-radius: 50%;
    z-index: -1;
    animation: pulse 8s infinite alternate;
  }

  .card {
    animation: fadeInUp 0.9s ease both;
  }

  @keyframes pulse {
    from { transform: scale(1); opacity: 0.5; }
    to { transform: scale(1.5); opacity: 0.8; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 576px) {
    .card {
      padding: 1rem;
    }
    .card h3 {
      font-size: 1.5rem;
    }
    .page-hero {
      min-height: auto;
      padding-top: 2rem;
      padding-bottom: 2rem;
    }
    .card {
      max-height: none;
      overflow-y: visible;
    }
    body {
      background-attachment: scroll;
    }
  }
</style>
<div class="container page-hero d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 80px);">
    <div class="row w-100 justify-content-center">
        <div class="col-lg-8 col-xl-7">
            
           
            <div class="card bg-dark bg-opacity-75 text-white border border-secondary border-opacity-50 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-4 p-md-5">
                    
                    <h3 class="text-center mb-5 fw-bold tracking-widest text-uppercase">
                        <span class="text-info border-bottom border-2 border-info pb-1">Create</span> Identity
                    </h3>

                    <form action="{% url 'Registration' %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row g-4">
                           
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">FULL NAME</label>
                                    <input type="text" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="name" value="{{data.name}}" placeholder="Rahul kahar">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">EMAIL ADDRESS</label>
                                    <input type="email" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="email" value="{{data.email}}" placeholder="name@rahul.com">
                                    <span class="text-danger small">{{msg}}</span>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">CONTACT NO.</label>
                                    <input type="number" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="contact" value="{{data.contact}}" placeholder="+91 XXXX">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">LOCATION (CITY)</label>
                                    <input type="text" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="city" value="{{data.city}}" placeholder="Gorakhpur">
                                </div>
                            </div>

                            
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">PASSWORD</label>
                                    <input type="password" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="password" placeholder="••••••••">
                                    <span class="text-danger small">{{pmsg}}</span>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">CONFIRM PASSWORD</label>
                                    <input type="password" class="form-control bg-transparent border-0 border-bottom border-secondary rounded-0 text-white px-0" name="cpassword" placeholder="••••••••">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-info fw-bold">PROFILE AVATAR</label>
                                    <input type="file" class="form-control bg-dark border-secondary text-secondary rounded-pill small" name="photo" accept=".png,.jpg">
                                </div>

                                <div class="mt-5">
                                    <button type="submit" class="btn btn-info rounded-pill w-100 fw-bold py-2 text-uppercase shadow-info">
                                        Initialize Account
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <p class="small text-muted">Already registered? <a href="{% url 'login' %}" class="text-info text-decoration-none">Portal Login</a></p>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock content %}
